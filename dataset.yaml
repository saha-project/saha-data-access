Resources:
  - Description: "Processed AnnData h5ad objects — organ-level CosMx RNA/Protein and sample-level Xenium"
    ARN: arn:aws:s3:::saha-open-data/processed/
    Region: us-east-1
    Type: S3 Bucket
    Explore:
      - "[Browse processed h5ad files](https://s3.console.aws.amazon.com/s3/buckets/saha-open-data?prefix=processed/)"
  - Description: "SpatialData zarr objects for interactive spatial analysis (Xenium and CosMx)"
    ARN: arn:aws:s3:::saha-open-data/zarr/
    Region: us-east-1
    Type: S3 Bucket
  - Description: "Metadata Parquet tables: samples, donors, runs, panels — queryable via Athena"
    ARN: arn:aws:s3:::saha-open-data/metadata/
    Region: us-east-1
    Type: S3 Bucket
  - Description: "Raw CosMx flat files (expression matrix, transcript positions, cell metadata, morphology TIFFs) — requires registration"
    ARN: arn:aws:s3:::saha-open-data/raw/
    Region: us-east-1
    Type: S3 Bucket
  - Description: "AWS Glue Data Catalog — SAHA metadata tables queryable via Athena"
    ARN: arn:aws:glue:us-east-1::database/saha
    Region: us-east-1
    Type: AWS Glue Table
