Name: Spatial Atlas of Human Anatomy (SAHA)
Description: |
  The Spatial Atlas of Human Anatomy (SAHA) is a multimodal, subcellular-resolution
  spatial reference atlas of healthy and diseased human tissues. SAHA profiles 15M+
  cells from 100+ donors across 16 tissue types using CosMx (RNA and protein), Xenium,
  GeoMx, and RNAscope spatial omics platforms, capturing matched RNA (up to 19,000 genes),
  protein (67 markers), and histological data. Tissues include colon, small intestine,
  stomach, pancreas, liver, appendix, lymph node, bone marrow, prostate, and others.

  Data formats include:
  - AnnData h5ad objects (organ-level for CosMx, sample-level for Xenium)
  - SpatialData zarr objects (Xenium, CosMx)
  - Raw CosMx flat files (expression matrix, transcript, metadata, morphology TIFF)
  - Metadata Parquet tables queryable via Amazon Athena (samples, donors, runs, panels)

Documentation: https://github.com/masonlab/saha-data-access
Contact: saha-project.org
ManagedBy: "[Mason Lab, Weill Cornell Medicine](https://masonlab.org/)"
UpdateFrequency: As data from new donors and tissue types are processed and validated.
