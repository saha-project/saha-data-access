Name: Spatial Atlas of Human Anatomy (SAHA)
Description: |
  The Spatial Atlas of Human Anatomy (SAHA) is a multimodal, subcellular-resolution
  spatial reference atlas of human tissues profiling 15M+ cells from 100+ donors
  across 16 tissue types. SAHA captures matched RNA (up to 19,000 genes), protein
  (67 markers), and histological data at ~50 nm resolution using CosMx, Xenium,
  GeoMx, and RNAscope spatial omics platforms. Tissues include colon, small
  intestine, stomach, pancreas, liver, appendix, lymph node, bone marrow, prostate,
  and others, as well as disease samples (colorectal cancer, pancreatic ductal
  adenocarcinoma, and inflammatory bowel disease).
  Data formats include AnnData h5ad objects (organ-level for CosMx, sample-level
  for Xenium), SpatialData zarr objects, raw CosMx flat files, and Parquet metadata
  tables queryable via Amazon Athena.
Documentation: https://github.com/masonlab/saha-data-access
Contact: https://www.saha-project.org/
ManagedBy: "[Mason Lab, Weill Cornell Medicine](https://masonlab.org/)"
UpdateFrequency: As data from new donors and tissue types are processed and validated.
